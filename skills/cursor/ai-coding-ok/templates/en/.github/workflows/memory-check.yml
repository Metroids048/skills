name: Memory Check

# When core code changes, remind contributors to update the project memory files.
on:
  pull_request:
    branches: [main, develop]
    paths:
      # {{adjust to your project's source directory}}
      - "src/**"
      - "pyproject.toml"

jobs:
  memory-check:
    name: "🧠 Memory Update Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if memory files were updated
        id: memory
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          CORE_CHANGES=false
          if echo "$CHANGED_FILES" | grep -qE '^(src/)'; then
            CORE_CHANGES=true
          fi

          MEMORY_UPDATED=false
          if echo "$CHANGED_FILES" | grep -qE '\.github/agent/memory/'; then
            MEMORY_UPDATED=true
          fi

          echo "core_changes=$CORE_CHANGES" >> $GITHUB_OUTPUT
          echo "memory_updated=$MEMORY_UPDATED" >> $GITHUB_OUTPUT

      - name: Remind to update memory
        if: steps.memory.outputs.core_changes == 'true' && steps.memory.outputs.memory_updated == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🧠 Memory update reminder

            This PR contains core code changes but does not update the project memory files.

            Please check whether the following files need updating:
            - \`.github/agent/memory/project-memory.md\` — project fact changes
            - \`.github/agent/memory/decisions-log.md\` — new technical decisions
            - \`.github/agent/memory/task-history.md\` — task records

            > If this change does not involve architecture or major decisions, you can ignore this reminder.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Memory update detected
        if: steps.memory.outputs.memory_updated == 'true'
        run: echo "✅ Memory files have been updated in this PR"
