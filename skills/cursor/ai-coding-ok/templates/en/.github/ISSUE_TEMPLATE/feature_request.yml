name: "✨ Feature Request"
description: "Propose a new feature"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feature suggestion! Please describe your need in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: "Problem / motivation"
      description: "What problem does this feature solve?"
      placeholder: "When I need xxx, there is currently no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      placeholder: "I would like to be able to..."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: "User story"
      placeholder: |
        As a [role],
        I want [feature],
        so that [value].

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance criteria"
      placeholder: |
        - [ ] Condition 1
        - [ ] Condition 2

  - type: dropdown
    id: priority
    attributes:
      label: "Priority suggestion"
      options:
        - "P0 — must have"
        - "P1 — should have"
        - "P2 — nice to have"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "Additional info"
