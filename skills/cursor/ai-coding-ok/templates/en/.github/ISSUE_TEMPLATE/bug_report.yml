name: "🐛 Bug Report"
description: "Report a bug"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: "Bug description"
      description: "A clear and concise description of the bug"
      placeholder: "When I do xxx, the following happens..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Reproduction steps"
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / logs"
      description: "Paste any screenshots or error logs here"

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "🔴 Critical — system unusable"
        - "🟠 High — core functionality affected"
        - "🟡 Medium — workaround exists"
        - "🟢 Low — minor issue"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      placeholder: |
        - OS: [e.g. Windows 11]
        - Language version: [e.g. Python 3.12]
        - Browser: [e.g. Chrome 130]
