# ai-coding-ok: v3.0.0
# {{project-name}} — project metadata
# Machine-readable project metadata for CI/CD, agents, and tooling.

project:
  name: "{{project-name}}"
  description: "{{project-description}}"
  version: "0.1.0"
  stage: "development"  # development / staging / production
  created: "{{YYYY-MM-DD}}"
  user_scale: "{{user-scale}}"
  design_principle: "{{design-principle}}"

tech_stack:
  language: "{{language}}"
  language_version: "{{version}}"
  backend_framework: "{{framework}}"
  frontend: "{{frontend-stack}}"
  orm: "{{orm}}"
  database: "{{database}}"
  database_driver: "{{database-driver}}"
  test_framework: "{{test-framework}}"
  config: "{{config-strategy}}"
  package_manager: "{{package-manager}}"

code_quality:
  formatter: "{{formatter}}"
  linter: "{{linter}}"
  type_checker: "{{type-checker}}"
  test_framework: "{{test-framework}}"
  min_coverage: 80

commands:
  install: "{{install-command}}"
  dev: "{{dev-start-command}}"
  test: "{{test-command}}"
  test_coverage: "{{coverage-command}}"
  lint: "{{lint-command}}"
  format: "{{format-command}}"

structure:
  source_dir: "src"
  test_dir: "tests"
  docs_dir: "docs"
  scripts_dir: "scripts"

conventions:
  commit_format: "conventional-commits"
  branch_strategy: "github-flow"
  code_review: "recommended"
